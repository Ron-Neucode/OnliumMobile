openapi: 3.0.3
info:
  title: Onlium Mobile API
  version: 1.0.0
  description: API for the Onlium Mobile enrollment app.
servers:
  - url: https://localhost:5001
    description: Local development server
paths:
  /api/auth/register:
    post:
      summary: Register a new student user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email, password, studentType]
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                studentType:
                  type: string
                  enum: [newIncoming, transferee, continuing]
      responses:
        "201":
          description: User registered
        "400":
          description: Validation or duplicate email
  /api/auth/login:
    post:
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
  /api/users/{userId}:
    get:
      summary: Get user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
  /api/enrollments:
    get:
      summary: Get enrollments for a user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Enrollment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnrollmentRequest"
    post:
      summary: Submit a new enrollment request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [studentId, studentName, studentEmail, studentType, program]
              properties:
                studentId:
                  type: string
                studentName:
                  type: string
                studentEmail:
                  type: string
                  format: email
                studentType:
                  type: string
                  enum: [newIncoming, transferee, continuing]
                program:
                  type: string
                status:
                  type: string
                  enum:
                    [
                      pending,
                      underReview,
                      approved,
                      rejected,
                      paymentRequired,
                      completed,
                    ]
      responses:
        "201":
          description: Enrollment request created
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        studentType:
          type: string
          enum: [newIncoming, transferee, continuing]
    EnrollmentRequest:
      type: object
      properties:
        id:
          type: string
        studentId:
          type: string
        studentName:
          type: string
        studentEmail:
          type: string
        studentType:
          type: string
          enum: [newIncoming, transferee, continuing]
        program:
          type: string
        status:
          type: string
          enum:
            [
              pending,
              underReview,
              approved,
              rejected,
              paymentRequired,
              completed,
            ]
        submittedAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        reviewedBy:
          type: string
          nullable: true
        reviewNotes:
          type: string
          nullable: true
